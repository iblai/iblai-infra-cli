---
- name: Launch Open edX (ibl edx launch)
  become: false
  shell: |
    export PYENV_ROOT="{{ pyenv_root }}"
    export PATH="$PYENV_ROOT/bin:$PATH"
    eval "$(pyenv init -)"; eval "$(pyenv virtualenv-init -)"
    pyenv activate "{{ venv_name }}"
    ibl edx launch 2>&1
  args:
    executable: /bin/bash
    chdir: "{{ repo_dir }}"
  environment:
    HOME: "/home/{{ ansible_user }}"
    IBL_ROOT: "{{ ibl_root }}/"
  timeout: 3600
  register: edx_launch_result
  ignore_errors: true

- name: Show ibl edx launch output
  debug:
    var: edx_launch_result.stdout_lines
  when: edx_launch_result.stdout_lines is defined

- name: Fail if ibl edx launch timed out
  fail:
    msg: "ibl edx launch timed out after 3600s. SSH in and run 'ibl edx launch' manually."
  when: edx_launch_result is mapping and edx_launch_result.timedout is defined

- name: Fail if ibl edx launch failed
  fail:
    msg: "ibl edx launch failed with exit code {{ edx_launch_result.rc }}"
  when: edx_launch_result.rc is defined and edx_launch_result.rc != 0

- name: Verify edX containers are running
  become: false
  shell: docker ps --filter "name=ibl_prod_lms" --format "{{ '{{' }}.Names{{ '}}' }}" 2>&1
  args:
    executable: /bin/bash
  register: edx_containers

- name: Show running edX containers
  debug:
    var: edx_containers.stdout_lines

- name: Fail if no edX containers are running
  fail:
    msg: >-
      No edX containers found after launch.
      Check 'ibl edx launch' output above for errors.
  when: edx_containers.stdout | trim | length == 0

- name: Wait for LMS to be ready
  become: false
  shell: |
    curl -s -o /dev/null -w '%{http_code}' http://localhost:8600/heartbeat 2>/dev/null | grep -q '200'
  args:
    executable: /bin/bash
  register: lms_health
  until: lms_health.rc == 0
  retries: 40
  delay: 15

- name: Check LMS container is not crash-looping
  become: false
  shell: |
    docker inspect --format '{{ '{{' }}.RestartCount{{ '}}' }}' ibl_prod_lms
  args:
    executable: /bin/bash
  register: lms_restart_count

- name: Fail if LMS is crash-looping
  fail:
    msg: >-
      ibl_prod_lms has restarted {{ lms_restart_count.stdout | trim }} times.
      Run 'docker logs ibl_prod_lms' on the server to diagnose.
  when: lms_restart_count.stdout | trim | int > 3
