---
- name: Configure edX version
  become: false
  shell: |
    export PYENV_ROOT="{{ pyenv_root }}"
    export PATH="$PYENV_ROOT/bin:$PATH"
    eval "$(pyenv init -)"; eval "$(pyenv virtualenv-init -)"
    pyenv activate "{{ venv_name }}"
    ibl config save --set IBL_EDX.VERSION='{{ edx_version }}'
  args:
    executable: /bin/bash
  environment:
    HOME: "/home/{{ ansible_user }}"

- name: Configure base domain
  become: false
  shell: |
    export PYENV_ROOT="{{ pyenv_root }}"
    export PATH="$PYENV_ROOT/bin:$PATH"
    eval "$(pyenv init -)"; eval "$(pyenv virtualenv-init -)"
    pyenv activate "{{ venv_name }}"
    ibl config save --set BASE_DOMAIN='{{ base_domain }}'
  args:
    executable: /bin/bash
  environment:
    HOME: "/home/{{ ansible_user }}"

- name: Launch global reverse proxy
  become: false
  shell: |
    export PYENV_ROOT="{{ pyenv_root }}"
    export PATH="$PYENV_ROOT/bin:$PATH"
    eval "$(pyenv init -)"; eval "$(pyenv virtualenv-init -)"
    pyenv activate "{{ venv_name }}"
    ibl global-proxy launch-without-security
  args:
    executable: /bin/bash
  environment:
    HOME: "/home/{{ ansible_user }}"

- name: Configure environment
  become: false
  shell: |
    export PYENV_ROOT="{{ pyenv_root }}"
    export PATH="$PYENV_ROOT/bin:$PATH"
    eval "$(pyenv init -)"; eval "$(pyenv virtualenv-init -)"
    pyenv activate "{{ venv_name }}"
    ibl config save --set ENVIRONMENT_CONFIG='{{ env_config }}'
  args:
    executable: /bin/bash
  environment:
    HOME: "/home/{{ ansible_user }}"

- name: Configure DM image
  become: false
  shell: |
    export PYENV_ROOT="{{ pyenv_root }}"
    export PATH="$PYENV_ROOT/bin:$PATH"
    eval "$(pyenv init -)"; eval "$(pyenv virtualenv-init -)"
    pyenv activate "{{ venv_name }}"
    ibl config save --set IBL_DM.IBL_DM_IMAGE='765174860755.dkr.ecr.us-east-1.amazonaws.com/ibl-dm-pro:{{ dm_image_tag }}'
  args:
    executable: /bin/bash
  environment:
    HOME: "/home/{{ ansible_user }}"

- name: Configure edX image
  become: false
  shell: |
    export PYENV_ROOT="{{ pyenv_root }}"
    export PATH="$PYENV_ROOT/bin:$PATH"
    eval "$(pyenv init -)"; eval "$(pyenv virtualenv-init -)"
    pyenv activate "{{ venv_name }}"
    ibl config save --set IBL_EDX.IBL_EDX_IMAGE='765174860755.dkr.ecr.us-east-1.amazonaws.com/ibl-edx-pro:{{ edx_image_tag }}'
  args:
    executable: /bin/bash
  environment:
    HOME: "/home/{{ ansible_user }}"

- name: Login to ECR
  become: false
  shell: |
    aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 765174860755.dkr.ecr.us-east-1.amazonaws.com
  args:
    executable: /bin/bash
  environment:
    HOME: "/home/{{ ansible_user }}"
    AWS_ACCESS_KEY_ID: "{{ aws_access_key_id }}"
    AWS_SECRET_ACCESS_KEY: "{{ aws_secret_access_key }}"
    AWS_DEFAULT_REGION: "{{ aws_default_region }}"
