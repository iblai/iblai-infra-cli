---
- name: Check for AWS CLI
  stat:
    path: /usr/local/bin/aws
  register: awscli

- name: Install AWS CLI v2
  when: not awscli.stat.exists
  block:
    - name: Download AWS CLI installer
      get_url:
        url: https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip
        dest: /tmp/awscliv2.zip
        mode: "0644"

    - name: Extract AWS CLI installer
      unarchive:
        src: /tmp/awscliv2.zip
        dest: /tmp
        remote_src: true

    - name: Run AWS CLI installer
      command: /tmp/aws/install

- name: Verify AWS CLI version
  command: /usr/local/bin/aws --version
  changed_when: false
  ignore_errors: true

# Writes the ECR pull credentials (ibl.ai-provided) to
# ~/.aws/credentials [default] so `aws ecr get-login-password` picks them
# up by default everywhere on the host. The S3 access keys (customer-
# created post-provision) live in /ibl/config.yml — written by the
# `ibl_platform` role, NOT here.
#
# `ecr_aws_*` falls back to `aws_*` upstream in runner.py when the
# operator hasn't supplied a separate ECR set (older single-key-set
# deployments).
- name: Configure ECR credentials in ~/.aws/credentials [default]
  when: ecr_aws_access_key_id | length > 0 and ecr_aws_secret_access_key | length > 0
  become: false
  block:
    - name: Set AWS access key ID (ECR)
      command: /usr/local/bin/aws configure set aws_access_key_id "{{ ecr_aws_access_key_id }}"

    - name: Set AWS secret access key (ECR)
      command: /usr/local/bin/aws configure set aws_secret_access_key "{{ ecr_aws_secret_access_key }}"
      no_log: true

    - name: Set AWS default region (ECR)
      command: /usr/local/bin/aws configure set default.region "{{ ecr_aws_default_region }}"

    - name: Set AWS output format
      command: /usr/local/bin/aws configure set output json
