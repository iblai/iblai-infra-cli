---
- name: Bootstrap IBL Platform (Single Server)
  hosts: ibl_servers
  become: true

  vars:
    python_version: "3.11.8"
    venv_name: "ibl-cli-ops"
    ibl_root: /ibl
    repo_dir: "/home/{{ ansible_user }}/ibl-cli-ops"
    pyenv_root: "/home/{{ ansible_user }}/.pyenv"
    bashrc_path: "/home/{{ ansible_user }}/.bashrc"
    docker_arch: >-
      {{ 'amd64' if ansible_architecture == 'x86_64'
         else 'arm64' if ansible_architecture == 'aarch64'
         else ansible_architecture }}

  pre_tasks:
    - name: Wait for cloud-init to finish
      command: cloud-init status --wait
      changed_when: false
      ignore_errors: true

    - name: Create IBL root directory
      file:
        path: "{{ ibl_root }}"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0755"

    - name: Ensure IBL root contents owned by ansible user
      shell: chown -Rh {{ ansible_user }}:{{ ansible_user }} {{ ibl_root }}/ 2>/dev/null || true
      args:
        executable: /bin/bash
      changed_when: false

  roles:
    - docker
    - awscli
    - python
    - ibl_cli_ops
    - ibl_platform
    - smtp_config
    - ibl_dm
    - ibl_edx
    - ibl_spa
    - integrations
    - admin_setup
    - data_seeding
    - ibl_tenant_platform
    - stripe_config
    - google_sso_config
    - microsoft_sso_config

  tasks:
    # Optional Playwright test fixture setup. Runs only when the operator
    # opted in via the `Create Playwright test platforms?` prompt at setup
    # time (or `--create-playwright-platforms` for `iblai infra launch`).
    - name: Set up Playwright test platforms
      ansible.builtin.include_role:
        name: playwright_test_platforms
      when: create_playwright_platforms | default(false) | bool

  post_tasks:
    # Final unconditional proxy reload. Runs AFTER every role and the
    # optional Playwright include, so any nginx state touched by SSO
    # roles (edX restarts in google_sso_config / microsoft_sso_config)
    # is picked up before the playbook exits.
    - name: Reload global proxy (final step)
      become: false
      ansible.builtin.shell: |
        export PYENV_ROOT="{{ pyenv_root }}"
        export PATH="$PYENV_ROOT/bin:$PATH"
        eval "$(pyenv init -)"; eval "$(pyenv virtualenv-init -)"
        pyenv activate "{{ venv_name }}"
        ibl global-proxy reload
      args:
        executable: /bin/bash
        chdir: "{{ repo_dir }}"
      environment:
        HOME: "/home/{{ ansible_user }}"
        IBL_ROOT: "{{ ibl_root }}/"
